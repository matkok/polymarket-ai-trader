services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent_trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-agent_trader}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_trader}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent_trader}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-agent_trader}
      GOOGLE_TRENDS_ENABLED: "false"
      WIKIPEDIA_ENABLED: "true"
    volumes:
      - ./src:/app/src
      - ./policy.yaml:/app/policy.yaml:ro
      - ./charter.md:/app/charter.md:ro

volumes:
  pgdata:
